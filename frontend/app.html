<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Joe Goldberg</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#140404;
  height:100vh;
  display:flex;
  flex-direction:column;
  color:#ffddcc;
  font-size:15px;
}

.titlebar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 22px;background:#1e0606;
  border-bottom:1px solid #3d1010;
  flex-shrink:0;
  -webkit-app-region:drag;
}
.dots{display:flex;gap:6px;-webkit-app-region:no-drag}
.dot{width:13px;height:13px;border-radius:50%;cursor:pointer}
.dr{background:#ff5f57}.dy{background:#febc2e}.dg{background:#28c840}
.brand{display:flex;flex-direction:column;margin-left:14px}
.brand-name{font-size:17px;font-weight:800;color:#ff6644;letter-spacing:1px}
.brand-sub{font-size:10px;color:#7a3030;letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.active-pill{
  font-size:12px;font-weight:700;color:#ff6644;
  background:#2d0808;border:1px solid #6a2020;
  padding:5px 16px;border-radius:20px;
  display:flex;align-items:center;gap:6px;
  -webkit-app-region:no-drag;
}
.a-dot{width:7px;height:7px;border-radius:50%;background:#ff4422}
.a-dot.pulse{animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}

.body{display:flex;flex:1;overflow:hidden;min-height:0}

.sidebar{
  width:235px;background:#180606;
  border-right:1px solid #2d0e0e;
  display:flex;flex-direction:column;
  padding:16px 0;flex-shrink:0;
  overflow-y:auto;
}
.sl{
  font-size:9px;font-weight:800;letter-spacing:2.5px;
  color:#6a2020;text-transform:uppercase;padding:0 16px 8px;
}
.case-item{
  padding:10px 16px;cursor:pointer;
  border-left:3px solid transparent;transition:all .15s;
}
.case-item:hover{background:rgba(200,50,20,.07)}
.case-item.active{border-left-color:#cc3311;background:rgba(200,50,20,.12)}
.cn{font-size:13px;font-weight:600;color:#ff9977}
.case-item.active .cn{color:#ff7755}
.cm{font-size:11px;color:#8a4030;margin-top:3px}
.case-item.active .cm{color:#cc6644}
.sdiv{height:1px;background:#250808;margin:12px 0}
.srow{display:flex;justify-content:space-between;padding:5px 16px;font-size:13px;color:#cc7755}
.srow span:last-child{font-weight:700;color:#ff8866}
.mrow{display:flex;align-items:center;gap:8px;padding:7px 16px}
.mdot{width:8px;height:8px;border-radius:50%;background:#cc3311}
.mname{font-size:13px;font-weight:600;color:#ff7755}
.tw{padding:12px 16px 0;margin-top:auto;border-top:1px solid #250808}
.tl{font-size:9px;font-weight:800;letter-spacing:2px;color:#6a2020;text-transform:uppercase;margin-bottom:8px}
.pill{display:inline-block;font-size:10px;font-weight:600;padding:4px 10px;border-radius:20px;margin:2px 2px 2px 0}
.pill.on{background:#2d0808;color:#ff9977;border:1px solid #6a2020}
.pill.off{background:#180606;color:#4a2020;border:1px solid #250808}

.chat{
  flex:1;display:flex;flex-direction:column;
  background:#140404;position:relative;
  overflow:hidden;min-height:0;
}
.joe-bg{
  position:absolute;right:0;top:0;bottom:0;width:65%;
  pointer-events:none;z-index:0;
}
.joe-bg img{
  width:100%;height:100%;
  object-fit:contain;object-position:right center;
  opacity:0.25;
  filter:sepia(1) saturate(1.5) hue-rotate(330deg) contrast(1.2) brightness(0.8);
}
.joe-fade{
  position:absolute;inset:0;z-index:0;pointer-events:none;
  background:linear-gradient(
    to right,
    #140404 20%,
    rgba(20,4,4,0.6) 45%,
    rgba(20,4,4,0.15) 65%,
    #140404 100%
  );
}

.msgs{
  flex:1;padding:22px 24px;
  display:flex;flex-direction:column;
  gap:18px;overflow-y:auto;
  position:relative;z-index:1;
  min-height:0;
}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-track{background:transparent}
.msgs::-webkit-scrollbar-thumb{background:#3d1010;border-radius:2px}

.msg{display:flex;flex-direction:column;gap:5px}
.mmeta{font-size:11px;font-weight:600;padding:0 4px;color:#8a4030}
.msg-u{align-items:flex-end}
.msg-u .mmeta{color:#cc5533}
.msg-j{align-items:flex-start}
.msg-j .mmeta{color:#8a4030}

.bubble{padding:14px 18px;border-radius:14px;font-size:14.5px;line-height:1.85}
.msg-u .bubble{
  background:#8b1a08;color:#ffe8e0;
  border-bottom-right-radius:3px;max-width:65%;
  border:1px solid #aa2a10;
}
.msg-j .bubble{
  background:#1e0606;color:#ffddcc;
  border:1px solid #4d1515;
  border-bottom-left-radius:3px;max-width:90%;
}

.scan{font-family:'SF Mono',Monaco,monospace;font-size:13px;color:#aa6050;line-height:2.1}
.hit-row{display:flex;align-items:center;gap:10px;line-height:2.4;padding-left:12px}
.hit-check{color:#3aad50;font-weight:700;font-size:15px}
.hit-warn{color:#ff5533;font-weight:700;font-size:15px}
.hit-name{font-size:14px;font-weight:700;color:#ffddcc}
.hit-tag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;text-transform:uppercase;letter-spacing:.5px}
.hit-tag.found{background:#0d2018;color:#3aad50;border:1px solid #1a4030}
.hit-tag.breach{background:#2d0808;color:#ff5533;border:1px solid #5a1818}

.joe-quote{
  font-size:14px;color:#ffaa80;font-style:italic;
  padding:10px 14px 10px 16px;
  border-left:3px solid #aa4422;
  background:rgba(200,80,20,.1);
  border-radius:0 8px 8px 0;margin:6px 0;line-height:1.9;
}

.findings-head{font-size:10px;font-weight:800;letter-spacing:3px;color:#aa5040;text-transform:uppercase;margin:12px 0 8px}
.f-row{display:flex;align-items:center;gap:10px;font-size:13.5px;line-height:2.2}
.f-key{font-size:11px;font-weight:800;color:#aa5040;min-width:100px;text-transform:uppercase;letter-spacing:.5px}
.f-val{color:#ffddcc;font-weight:500}
.fdiv{border:none;border-top:1px solid #3d1010;margin:10px 0}
.ftag{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:4px}
.ftag-r{background:#2d0808;color:#ff5533;border:1px solid #5a1818}
.ftag-g{background:#0d2018;color:#3aad50;border:1px solid #1a4030}
.risk-wrap{display:flex;align-items:center;gap:10px}
.rbar{height:5px;width:120px;background:#2d0e0e;border-radius:2px}
.rfill{height:100%;background:linear-gradient(90deg,#aa2a10,#ff4422);border-radius:2px}
.rnum{font-size:13px;font-weight:800;color:#ff5533}

.monologue{
  font-size:14.5px;color:#ffcca8;font-style:italic;
  line-height:2;padding:16px 18px;
  background:rgba(140,20,10,.12);
  border:1px solid #5d1a10;
  border-left:3px solid #ff4422;
  border-radius:0 10px 10px 0;margin-top:10px;
  font-weight:400;
}
.monologue strong{color:#ff9977;font-style:normal;font-weight:700}
.monologue em{color:#ffb38a;font-style:italic;}
.monologue h1, .monologue h2, .monologue h3 { color:#ff8866; margin-bottom:8px; margin-top:12px; font-style:normal; font-weight:800; }
.monologue h1 { font-size:18px; }
.monologue h2 { font-size:16px; }
.monologue h3 { font-size:15px; }
.monologue p { margin-bottom:10px; }
.monologue p:last-child { margin-bottom:0; }
.monologue ul, .monologue ol { margin-left:22px; margin-bottom:10px; }
.monologue li { margin-bottom:4px; }
.monologue code { background:rgba(0,0,0,0.3); padding:2px 5px; border-radius:4px; font-family:monospace; font-size:13px; }
.monologue pre { background:#0a0202; padding:12px; border-radius:6px; overflow-x:auto; border:1px solid #3d1010; margin-bottom:10px; }
.monologue pre code { background:transparent; padding:0; border-radius:0; }

.typing{display:flex;gap:5px;padding:8px 4px;align-items:center}
.typing span{
  width:7px;height:7px;border-radius:50%;
  background:#cc5533;animation:bounce .8s ease-in-out infinite;
}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

.input-wrap{
  padding:15px 22px;background:#1e0606;
  border-top:1px solid #3d1010;
  display:flex;align-items:center;gap:12px;
  z-index:2;flex-shrink:0;
}
.pbadge{
  font-size:14px;font-weight:800;color:#ffe8e0;
  background:#8b1a08;padding:8px 16px;border-radius:8px;
  white-space:nowrap;border:1px solid #aa2a10;
}
#msg-input{
  flex:1;font-size:14px;color:#ffddcc;
  background:#0d0202;border:1px solid #4d1515;
  border-radius:8px;padding:11px 16px;
  outline:none;font-family:inherit;
  transition:border-color .15s;
}
#msg-input:focus{border-color:#cc3311}
#msg-input::placeholder{color:#6a3030;font-size:13px}
.sbtn{
  width:40px;height:40px;background:#8b1a08;
  border-radius:8px;display:flex;
  align-items:center;justify-content:center;
  cursor:pointer;border:none;flex-shrink:0;
  transition:background .15s;
}
.sbtn:hover{background:#aa2a10}
.sbtn svg{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

.sbar{
  display:flex;align-items:center;
  background:#180606;border-top:1px solid #250808;
  flex-shrink:0;flex-wrap:nowrap;overflow:hidden;
}
.sb{
  font-size:11px;font-weight:600;color:#8a4030;
  padding:8px 16px;border-right:1px solid #250808;
  display:flex;align-items:center;gap:6px;white-space:nowrap;
}
.sb .v{color:#ff7755;font-weight:700}
.sb:last-child{margin-left:auto;border-right:none}
.live-dot{width:6px;height:6px;border-radius:50%;background:#cc3311;animation:pulse 1.5s ease-in-out infinite}
.stream-text { white-space: pre-wrap; font-style: italic; color: #ffcca8; }
</style>
</head>
<body>

<div class="titlebar">
  <div style="display:flex;align-items:center">
    <div class="dots">
      <div class="dot dr" onclick="window.close()"></div>
      <div class="dot dy"></div>
      <div class="dot dg"></div>
    </div>
    <div class="brand">
      <div class="brand-name">JOE GOLDBERG</div>
      <div class="brand-sub">OSINT Investigator</div>
    </div>
  </div>
  <div class="active-pill">
    <div class="a-dot" id="status-dot"></div>
    <span id="status-text">API Active</span>
  </div>
</div>

<div class="body">
  <div class="sidebar">
    <div class="sl">Cases</div>
    <div id="case-list"><div style="padding:8px 16px;font-size:12px;color:#4a2020">No cases yet</div></div>
    <div class="sdiv"></div>
    <div class="sl">Session</div>
    <div class="srow"><span>Entities</span><span id="s-entities">0</span></div>
    <div class="srow"><span>Breaches</span><span id="s-breaches">0</span></div>
    <div class="srow"><span>Pivots</span><span id="s-pivots">0</span></div>
    <div class="srow"><span>Risk</span><span id="s-risk">—</span></div>
    <div class="sdiv"></div>
    <div class="sl">Model</div>
    <div class="mrow">
      <div class="mdot"></div>
      <span class="mname">gemini-2.5-flash</span>
    </div>
    <div class="tw">
      <div class="tl">Tools</div>
      <span class="pill on">sherlock</span>
      <span class="pill on">maigret</span>
      <span class="pill on">whois</span>
      <span class="pill on">nmap</span>
      <span class="pill on">crt.sh</span>
      <span class="pill on">holehe</span>
      <span class="pill on">breachdirectory</span>
      <span class="pill on">psbdmp</span>
      <span class="pill on">github</span>
      <span class="pill on">wayback</span>
      <span class="pill on">ip-api</span>
    </div>
  </div>

  <div class="chat">
    <div class="joe-bg">
      <img src="joe.jpeg" alt="" onerror="this.style.display='none'">
    </div>
    <div class="joe-fade"></div>
    <div class="msgs" id="msgs"></div>
    <div class="input-wrap">
      <div class="pbadge">joe &rsaquo;</div>
      <input id="msg-input"
             placeholder="stalk target@email.com — or ask Joe anything..."
             autocomplete="off" spellcheck="false">
      <button class="sbtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2" fill="#fff" stroke="none"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<div class="sbar">
  <div class="sb"><div class="live-dot"></div><span class="v">API Active</span></div>
  <div class="sb">Model <span class="v">gemini-2.5-flash</span></div>
  <div class="sb">Case <span class="v" id="sb-case">none</span></div>
  <div class="sb">Uptime <span class="v" id="sb-uptime">00:00</span></div>
  <div class="sb">Entities <span class="v" id="sb-entities">0</span></div>
</div>

<script>
const state = {
  entities: 0, breaches: 0, pivots: 0,
  startTime: Date.now(),
};
let isWorking = false;
let rateLimitTimer = null;

function setWorkingState(working) {
  isWorking = working;
  const input = document.getElementById('msg-input');
  const btn = document.querySelector('.sbtn');
  input.disabled = working;
  if (working) {
    btn.innerHTML = `<svg viewBox="0 0 24 24"><rect x="7" y="7" width="10" height="10" fill="#fff" stroke="none"/></svg>`;
    btn.style.cursor = 'not-allowed';
    btn.style.background = '#4d1515';
  } else {
    btn.innerHTML = `<svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2" fill="#fff" stroke="none"/></svg>`;
    btn.style.cursor = 'pointer';
    btn.style.background = '';
    setTimeout(() => input.focus(), 100);
  }
}

function blockForRateLimit(delaySeconds) {
  setWorkingState(true);
  const input = document.getElementById('msg-input');
  let remaining = delaySeconds;
  
  if (rateLimitTimer) clearInterval(rateLimitTimer);
  
  rateLimitTimer = setInterval(() => {
    if (remaining <= 0) {
      clearInterval(rateLimitTimer);
      rateLimitTimer = null;
      setWorkingState(false);
      setStatus('Ready', false);
      document.getElementById('status-dot').style.background = '';
      input.placeholder = "stalk target@email.com — or ask Joe anything...";
    } else {
      input.placeholder = `API Rate Limited. Retrying in ${remaining}s...`;
      setStatus(`Rate Limited (${remaining}s)`, true);
      document.getElementById('status-dot').style.background = '#ffbc2e';
      remaining--;
    }
  }, 1000);
}

setInterval(() => {
  const s = Math.floor((Date.now() - state.startTime) / 1000);
  const m = Math.floor(s / 60).toString().padStart(2,'0');
  const sec = (s % 60).toString().padStart(2,'0');
  document.getElementById('sb-uptime').textContent = `${m}:${sec}`;
}, 1000);

function sendMessage() {
  if (isWorking || rateLimitTimer) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addUserBubble(text);
  
  setWorkingState(true);

  const parts = text.split(' ');
  const cmd = parts[0].toLowerCase();
  if (cmd === 'stalk' || cmd === 'pivot') {
    if (cmd === 'pivot') state.pivots++;
    window.pywebview.api.stalk(parts.slice(1).join(' '));
    setStatus('Investigating', true);
  } else if (cmd === 'resume') {
    window.pywebview.api.resume(parts.slice(1).join(' '));
    setWorkingState(false);
  } else if (cmd === 'cases') {
    window.pywebview.api.list_cases();
    setWorkingState(false);
  } else if (cmd === 'export') {
    window.pywebview.api.export_report();
    setWorkingState(false);
  } else if (cmd === 'notes') {
    window.pywebview.api.add_note(parts.slice(1).join(' '));
    setWorkingState(false);
  } else {
    showTyping();
    window.pywebview.api.ask(text);
  }
}

document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMessage();
});

window.joe = {
  receive(event, data) {
    switch (event) {
      case 'scan_status': appendScanLine(data.message); break;
      case 'entity_found':
        appendHitRow(data);
        state.entities++;
        if (data.type === 'breach') state.breaches++;
        updateStats();
        break;
      case 'investigation_done':
        if (data.monologue) {
          let daily = data.monologue.match(/\[Daily Quota\]/);
          let m = data.monologue.match(/\[Retry in (\d+(?:\.\d+)?)s\]/);
          if (daily) {
            data.monologue = data.monologue.replace(daily[0], '').trim();
            setStatus('Daily Limit', true);
            document.getElementById('status-dot').style.background = '#ff4422';
            setWorkingState(true);
            document.getElementById('msg-input').placeholder = "Daily quota reached. See you tomorrow.";
          } else if (m) {
            blockForRateLimit(Math.ceil(parseFloat(m[1])));
            data.monologue = data.monologue.replace(m[0], '').trim();
          } else if (data.monologue.includes('- API ratelimiting me')) {
            setStatus('Rate Limited', true);
            document.getElementById('status-dot').style.background = '#ffbc2e';
            setWorkingState(false);
          } else {
            setStatus('Ready', false);
            document.getElementById('status-dot').style.background = '';
            setWorkingState(false);
          }
        }
        finishInvestigation(data);
        break;
      case 'joe_stream': handleJoeStream(data.chunk); break;
      case 'joe_answer': 
        if (data.text) {
          let daily = data.text.match(/\[Daily Quota\]/);
          let m = data.text.match(/\[Retry in (\d+(?:\.\d+)?)s\]/);
          if (daily) {
            data.text = data.text.replace(daily[0], '').trim();
            setStatus('Daily Limit', true);
            document.getElementById('status-dot').style.background = '#ff4422';
            setWorkingState(true);
            document.getElementById('msg-input').placeholder = "Daily quota reached. See you tomorrow.";
          } else if (m) {
            blockForRateLimit(Math.ceil(parseFloat(m[1])));
            data.text = data.text.replace(m[0], '').trim();
          } else if (data.text.includes('- API ratelimiting me')) {
            setStatus('Rate Limited', true);
            document.getElementById('status-dot').style.background = '#ffbc2e';
            setWorkingState(false);
          } else {
            setStatus('Ready', false);
            document.getElementById('status-dot').style.background = '';
            setWorkingState(false);
          }
        }
        finalizeJoeStream(data.text); 
        break;
      case 'cases_loaded': renderCaseList(data.cases); break;
      case 'resumed': resumeCase(data); break;
      case 'report_ready': addJoeMonologue(`Report saved to: ${data.path}`); break;
      case 'error': addJoeMonologue(data.message); setWorkingState(false); break;
    }
  }
};

let currentJoeBubble = null;

function addUserBubble(text) {
  currentJoeBubble = null;
  const msgs = document.getElementById('msgs');
  const div = document.createElement('div');
  div.className = 'msg msg-u';
  div.innerHTML = `<div class="mmeta">You &bull; ${now()}</div>
                   <div class="bubble">${esc(text)}</div>`;
  msgs.appendChild(div);
  scrollBottom();
}

function getJoeBubble() {
  if (currentJoeBubble) return currentJoeBubble;
  const msgs = document.getElementById('msgs');
  const wrap = document.createElement('div');
  wrap.className = 'msg msg-j';
  wrap.innerHTML = `<div class="mmeta">Joe &bull; ${now()}</div>
                    <div class="bubble"></div>`;
  msgs.appendChild(wrap);
  currentJoeBubble = wrap.querySelector('.bubble');
  scrollBottom();
  return currentJoeBubble;
}

function appendScanLine(msg) {
  const b = getJoeBubble();
  const line = document.createElement('div');
  line.className = 'scan';
  line.textContent = `› ${msg}`;
  b.appendChild(line);
  scrollBottom();
}

function appendHitRow(data) {
  const b = getJoeBubble();
  const isBreach = data.type === 'breach';
  const row = document.createElement('div');
  row.className = 'hit-row';
  row.innerHTML = `
    <span class="${isBreach ? 'hit-warn' : 'hit-check'}">${isBreach ? '⚠' : '✓'}</span>
    <span class="hit-name">${esc(data.value)}</span>
    ${data.platform ? `<span class="hit-tag ${isBreach ? 'breach' : 'found'}">${esc(data.platform)}</span>` : ''}
  `;
  b.appendChild(row);
  if (data.quote) {
    const q = document.createElement('div');
    q.className = 'joe-quote';
    q.textContent = `"${data.quote}"`;
    b.appendChild(q);
  }
  scrollBottom();
}

function finishInvestigation(data) {
  const b = getJoeBubble();
  const t = data.target;
  state.entities = t.entities.length;
  state.breaches = t.breaches.length;
  let html = `<div class="fdiv"></div><div class="findings-head">Findings</div>`;
  t.entities.slice(0,8).forEach(e => {
    html += `<div class="f-row">
      <span class="f-key">${esc(e.entity_type)}</span>
      <span class="f-val">${esc(e.value)}
        ${e.platform ? `<span class="ftag ftag-g">${esc(e.platform)}</span>` : ''}
      </span></div>`;
  });
  t.breaches.forEach(b2 => {
    html += `<div class="f-row">
      <span class="f-key">breach</span>
      <span class="f-val">${esc(b2.name)}
        <span class="ftag ftag-r">${esc(b2.date)}</span>
      </span></div>`;
  });
  const fillW = Math.round(t.risk_score * 100);
  html += `<div class="f-row">
    <span class="f-key">risk</span>
    <div class="risk-wrap">
      <div class="rbar"><div class="rfill" style="width:${fillW}%"></div></div>
      <span class="rnum">${t.risk_score.toFixed(2)}</span>
    </div></div>
  <div class="fdiv"></div>
  <div class="monologue">${formatMonologue(data.monologue)}</div>`;
  b.insertAdjacentHTML('beforeend', html);
  updateStats();
  document.getElementById('sb-case').textContent = t.primary;
  scrollBottom();
}

function addJoeMonologue(text) {
  currentJoeBubble = null;
  const msgs = document.getElementById('msgs');
  const div = document.createElement('div');
  div.className = 'msg msg-j';
  div.innerHTML = `<div class="mmeta">Joe &bull; ${now()}</div>
    <div class="bubble"><div class="monologue">${formatMonologue(text)}</div></div>`;
  msgs.appendChild(div);
  scrollBottom();
}

let activeStreamBubble = null;
function handleJoeStream(chunk) {
  removeTyping();
  if (!activeStreamBubble) {
    const msgs = document.getElementById('msgs');
    const wrap = document.createElement('div');
    wrap.className = 'msg msg-j';
    wrap.innerHTML = `<div class="mmeta">Joe &bull; ${now()}</div>
                      <div class="bubble"><div class="stream-text"></div></div>`;
    msgs.appendChild(wrap);
    activeStreamBubble = wrap.querySelector('.stream-text');
  }
  activeStreamBubble.textContent += chunk;
  scrollBottom();
}

function finalizeJoeStream(fullText) {
  removeTyping();
  if (!fullText) fullText = "[Silence...]";
  if (activeStreamBubble) {
    activeStreamBubble.parentElement.innerHTML = `<div class="monologue">${formatMonologue(fullText)}</div>`;
    activeStreamBubble = null;
  } else {
    addJoeMonologue(fullText);
  }
  scrollBottom();
}

function showTyping() {
  currentJoeBubble = null;
  const msgs = document.getElementById('msgs');
  const div = document.createElement('div');
  div.className = 'msg msg-j';
  div.id = 'typing-indicator';
  div.innerHTML = `<div class="mmeta">Joe</div>
    <div class="bubble">
      <div class="typing"><span></span><span></span><span></span></div>
    </div>`;
  msgs.appendChild(div);
  scrollBottom();
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function renderCaseList(cases) {
  const list = document.getElementById('case-list');
  if (!cases.length) {
    list.innerHTML = `<div style="padding:8px 16px;font-size:12px;color:#4a2020">No cases yet</div>`;
    return;
  }
  list.innerHTML = cases.map(c => `
    <div class="case-item" onclick="loadCase('${esc(c.primary)}')">
      <div class="cn">${esc(c.primary)}</div>
      <div class="cm">${c.target_type} &middot; ${c.breaches} breaches</div>
    </div>`).join('');
}

function resumeCase(data) {
  state.entities = data.entities ? data.entities.length : 0;
  state.breaches = data.breaches ? data.breaches.length : 0;
  updateStats();
  document.getElementById('sb-case').textContent = data.primary;
  addJoeMonologue(`Resumed: ${data.primary}. I remember everything.`);
}

function loadCase(target) {
  window.pywebview.api.resume(target);
  document.querySelectorAll('.case-item').forEach(el => {
    el.classList.toggle('active',
      el.querySelector('.cn')?.textContent === target);
  });
}

function setStatus(text, pulsing) {
  document.getElementById('status-text').textContent = text;
  document.getElementById('status-dot').classList.toggle('pulse', pulsing);
}

function updateStats() {
  document.getElementById('s-entities').textContent = state.entities;
  document.getElementById('s-breaches').textContent = state.breaches;
  document.getElementById('s-pivots').textContent = state.pivots;
  document.getElementById('sb-entities').textContent = state.entities;
}

function formatMonologue(text) {
  if (typeof marked !== 'undefined') {
    return marked.parse(text);
  }
  return esc(text)
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>');
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function now() {
  return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

function scrollBottom() {
  const msgs = document.getElementById('msgs');
  msgs.scrollTop = msgs.scrollHeight;
}

window.addEventListener('pywebviewready', () => {
  window.pywebview.api.list_cases();
});
</script>
</body>
</html>
